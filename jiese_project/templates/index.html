<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>戒色打卡系统</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.card {
    width: 420px;
    padding: 30px;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    text-align: center;
    box-shadow: 0 0 30px rgba(0,0,0,0.3);
}

h1 {
    font-size: 36px;
    margin-bottom: 5px;
}

.quote {
    font-size: 14px;
    color: #cbd5e1;
    margin-bottom: 20px;
}

.days {
    font-size: 70px;
    color: #22d3ee;
    font-weight: bold;
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #06b6d4;
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #0891b2;
}
</style>

</head>

<body>

<div class="card">

    <h1>戒色打卡</h1>

    <div class="quote">
        自律让你更自由
    </div>

    <div class="days">
        {{ days }}
    </div>

    <form action="/checkin" method="POST">
        <button>今日打卡</button>
    </form>

</div>

</body>
</html>
